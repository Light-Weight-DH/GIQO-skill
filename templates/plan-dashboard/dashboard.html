<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GIQO Plan Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%234f46e5'/%3E%3Ccircle cx='5' cy='5' r='1.5' fill='white'/%3E%3Ccircle cx='11' cy='8' r='1.5' fill='white'/%3E%3Ccircle cx='6' cy='12' r='1.5' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="dashboard.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="plan-rail" aria-label="Plans">
        <header class="brand-row">
          <strong>GIQO Dashboard</strong>
          <span class="readonly-badge">Read-only</span>
        </header>
        <section>
          <h2>Plans</h2>
          <div id="gqo-plan-list" class="plan-list"></div>
        </section>
        <button id="gqo-refresh" class="secondary-action" type="button">Refresh state</button>
      </aside>

      <main class="workspace">
        <header class="page-header">
          <div>
            <p class="eyebrow">Plan progress</p>
            <h1 id="gqo-title">Plans, phases, and tasks</h1>
            <p id="gqo-subtitle" class="subtitle">Read-only progress view generated from <code>plan.json</code> and <code>tasks.json</code>.</p>
          </div>
          <p id="gqo-status" class="updated-text" role="status">Loading dashboard state…</p>
        </header>

        <section class="summary-grid" aria-label="Task summary">
          <article><span>Progress</span><strong id="gqo-progress-label">0 / 0 applied</strong><div class="meter"><i id="gqo-progress-bar"></i></div><small id="gqo-progress-rate">0%</small></article>
          <article data-status="applied"><span>Applied</span><strong id="gqo-applied-count">0</strong></article>
          <article data-status="running"><span>Running</span><strong id="gqo-running-count">0</strong></article>
          <article data-status="saved"><span>Saved</span><strong id="gqo-saved-count">0</strong></article>
          <article data-status="stashed"><span>Stashed</span><strong id="gqo-stashed-count">0</strong></article>
          <article data-status="failed"><span>Failed</span><strong id="gqo-failed-count">0</strong></article>
          <article data-status="cancelled"><span>Cancelled</span><strong id="gqo-cancelled-count">0</strong></article>
        </section>

        <section class="work-grid">
          <section class="panel phases-panel" aria-label="Phases">
            <header class="panel-header"><h2>Phases</h2></header>
            <div id="gqo-phases" class="phase-stack"></div>
          </section>

          <section class="panel tasks-panel" aria-label="Tasks">
            <header class="panel-header"><h2 id="gqo-task-heading">Tasks</h2><span id="gqo-task-count" class="count-pill">0</span></header>
            <div class="task-table" role="table" aria-label="Tasks in selected phase">
              <div class="task-row task-head" role="row"><span>Status</span><span>Title</span><span>Updated</span></div>
              <div id="gqo-tasks"></div>
            </div>
          </section>

          <aside class="panel detail-panel" aria-label="Task details">
            <div id="gqo-detail"></div>
          </aside>
        </section>
      </main>
    </div>

    <script src="dashboard.js" type="module"></script>
  </body>
</html>
