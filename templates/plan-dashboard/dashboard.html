<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GIQO Plan Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%234f46e5'/%3E%3Ccircle cx='5' cy='5' r='1.5' fill='white'/%3E%3Ccircle cx='11' cy='8' r='1.5' fill='white'/%3E%3Ccircle cx='6' cy='12' r='1.5' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="dashboard.css">
  </head>
  <body>
    <main class="dashboard-shell">
      <header class="dashboard-header">
        <div>
          <p class="eyebrow">GIQO Plan Dashboard</p>
          <h1>Plans, phases, and tasks</h1>
          <p class="subtitle">Read-only progress view generated from <code>plan.json</code> and <code>tasks.json</code>.</p>
        </div>
        <div class="header-actions" aria-label="Dashboard actions">
          <button id="gqo-refresh" type="button">Refresh</button>
          <span class="readonly-badge">Read-only</span>
        </div>
      </header>

      <section class="summary-grid" aria-label="Task summary">
        <article>
          <span class="summary-label">Plans</span>
          <strong id="gqo-plan-count">0</strong>
        </article>
        <article>
          <span class="summary-label">Phases</span>
          <strong id="gqo-phase-count">0</strong>
        </article>
        <article>
          <span class="summary-label">Tasks</span>
          <strong id="gqo-task-count">0</strong>
        </article>
        <article>
          <span class="summary-label">Open work</span>
          <strong id="gqo-open-count">0</strong>
        </article>
      </section>

      <section id="gqo-status" class="status-message" role="status">Loading dashboard state…</section>
      <section id="gqo-board" class="plan-board" aria-label="Plan progress board"></section>
    </main>

    <script src="dashboard.js" type="module"></script>
  </body>
</html>
