<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GIQO Wireframe Review</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="review.css" />
  </head>
  <body>
    <main class="gqo-page">
      <p class="gqo-review-note" data-gqo-id="review.instructions">Use Comment mode for review notes, switch to Edit request for apply-ready changes, or add Global comment for feedback that is not tied to one element.</p>
      <section class="gqo-card" data-gqo-id="home.hero" data-gqo-scope="screen" data-gqo-editable="layout copy style">
        <p>Hero area</p>
        <h1>Primary value proposition</h1>
        <button data-gqo-id="home.hero.primary-cta" data-gqo-scope="element" data-gqo-editable="copy style">Primary CTA</button>
      </section>
      <section class="gqo-grid" aria-label="Feature sections">
        <article class="gqo-card" data-gqo-id="home.feature-1" data-gqo-scope="element" data-gqo-editable="copy layout">Feature block 1</article>
        <article class="gqo-card" data-gqo-id="home.feature-2" data-gqo-scope="element" data-gqo-editable="copy layout">Feature block 2</article>
        <article class="gqo-card" data-gqo-id="home.feature-3" data-gqo-scope="element" data-gqo-editable="copy layout">Feature block 3</article>
      </section>
    </main>
    <script src="review.js"></script>
  </body>
</html>
